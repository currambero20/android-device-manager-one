name: Build APK

on:
  workflow_dispatch:
    inputs:
      config_base64:
        description: 'Base64 encoded JSON configuration'
        required: true
      build_id:
        description: 'Build ID'
        required: true
      webhook_url:
        description: 'Webhook URL to notify upon completion'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Generate APK files
        run: |
          npx -y tsx scripts/generate-apk-files.ts
        env:
          APK_CONFIG_BASE64: ${{ github.event.inputs.config_base64 }}
          BUILD_ID: ${{ github.event.inputs.build_id }}

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias release -storepass android123 -keypass android123 -dname "CN=Android, O=Android, L=Global, ST=Global, C=US"
          
      - name: Build APK with Gradle
        working-directory: builds/${{ github.event.inputs.build_id }}
        run: |
          gradle wrapper --gradle-version 8.7

          # Start a background process to stream logs to the server every 10 seconds
          (
            while sleep 10; do
              if [ -f build.log ]; then
                LOGS=$(tail -n 100 build.log | base64 -w 0)
                curl -X POST -H "Content-Type: application/json" \
                  -d "{\"status\":\"building\",\"logs\":\"$LOGS\"}" \
                  "https://android-device-manager-one-1.onrender.com/api/apk/webhook/status/${{ github.event.inputs.build_id }}" || true
              fi
            done
          ) &
          STREAM_PID=$!
          
          # Run gradle and pipe output to build.log AND stdout
          ./gradlew assembleRelease 2>&1 | tee build.log
          
          # Kill the background streamer when done
          kill $STREAM_PID || true
        
      - name: Sign APK
        run: |
          apk_path=$(find builds/${{ github.event.inputs.build_id }}/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore release.keystore -storepass android123 -keypass android123 "$apk_path" release
          "$ANDROID_HOME/build-tools/34.0.0/zipalign" -v 4 "$apk_path" final-app.apk

      - name: Upload APK to Server
        if: success()
        run: |
          curl -v -X POST --data-binary @final-app.apk \
            -H "Content-Type: application/vnd.android.package-archive" \
            ${{ github.event.inputs.webhook_url }}/${{ github.event.inputs.build_id }}

      - name: Notify Webhook Failure
        if: failure()
        run: |
          # Capture end of logs to send to server
          # In a real GH action, we can't easily get 'our own' logs while running, 
          # but we can capture the output of the previous steps if we piped them.
          # For now, we will send the fact that it failed with a placeholder or known context.
          # Actually, I'll just send the buildId and status.
          # To get real logs without complex piping, I'll just send the run_id 
          # and let the server know it can fetch them if needed.
          
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"buildId\":\"${{ github.event.inputs.build_id }}\",\"status\":\"failed\",\"githubRunId\":\"${{ github.run_id }}\",\"logs\":\"Check GitHub Actions Run ID ${{ github.run_id }} for full details. Failure occurred in a build step.\"}" \
            ${{ github.event.inputs.webhook_url }}/status/${{ github.event.inputs.build_id }} || true
