name: Build APK

on:
  workflow_dispatch:
    inputs:
      config_base64:
        description: 'Base64 encoded JSON configuration'
        required: true
      build_id:
        description: 'Build ID'
        required: true
      webhook_url:
        description: 'Webhook URL to notify upon completion'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tsx
        run: npm install -g tsx

      - name: Generate APK project files
        env:
          APK_CONFIG_BASE64: ${{ github.event.inputs.config_base64 }}
          BUILD_ID: ${{ github.event.inputs.build_id }}
        run: tsx scripts/generate-apk-files.ts

      - name: Setup Gradle wrapper in project
        run: |
          PROJECT_DIR="builds/${{ github.event.inputs.build_id }}"
          echo "Project dir: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"
          
          # Generate gradle wrapper files inside the project directory
          cd "$PROJECT_DIR"
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x ./gradlew
          ls -la gradle/wrapper/

      - name: Build APK with Gradle
        run: |
          PROJECT_DIR="builds/${{ github.event.inputs.build_id }}"
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find built APK
        id: find_apk
        run: |
          PROJECT_DIR="builds/${{ github.event.inputs.build_id }}"
          APK_PATH=$(find "$PROJECT_DIR" -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK to Server
        if: success() && steps.find_apk.outputs.apk_path != ''
        run: |
          echo "Uploading APK to ${{ github.event.inputs.webhook_url }}/${{ github.event.inputs.build_id }}"
          curl -v -X POST \
            --data-binary @"${{ steps.find_apk.outputs.apk_path }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "${{ github.event.inputs.webhook_url }}/${{ github.event.inputs.build_id }}"

      - name: Notify Webhook on Failure
        if: failure()
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"buildId\":\"${{ github.event.inputs.build_id }}\",\"status\":\"failed\",\"githubRunId\":\"${{ github.run_id }}\"}" \
            "${{ github.event.inputs.webhook_url }}/status/${{ github.event.inputs.build_id }}" || true
